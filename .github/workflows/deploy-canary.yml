# Auto-deploy aggregator to ask.gptweb.ru on push to canary.
#
# Pipeline: GHA → SSH to Hetzner → git pull origin canary → docker build →
# docker compose up -d --force-recreate lobe → smoke probe.
#
# Build runs ON the VPS (not in GHA + GHCR) because:
#   1. lobehub container uses `image: lobechat-custom:latest` from local registry,
#      so GHCR roundtrip would require docker-compose.yml changes
#   2. Build cache lives on the VPS — GHA cold builds are slower than incremental
#      VPS rebuilds against existing layers
#
# Secrets required on the repo:
#   VPS_HOST            — 135.181.115.234
#   VPS_SSH_KEY         — private key matching deploy@VPS authorized_keys
#   VPS_SSH_USER        — deploy (defaults to root if not set)
name: Deploy canary → ask.gptweb.ru

on:
  push:
    branches: [canary]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/**'
      - '!.github/workflows/deploy-canary.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-canary
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest code on VPS
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=15 ${{ secrets.VPS_SSH_USER || 'root' }}@${{ secrets.VPS_HOST }} <<'EOF'
            set -e
            sudo -u deploy bash -c '
              cd /home/deploy/projects/ai-aggregator-lobechat
              git fetch origin canary
              git checkout canary
              git reset --hard origin/canary
              git log -1 --format="HEAD now at %h %s"
            '
          EOF

      - name: Build Docker image on VPS
        run: |
          # Long build (~15-25 min); detach via nohup, poll log until DONE.
          # Avoids SSH idle disconnect mid-build that broke run #4.
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=15 ${{ secrets.VPS_SSH_USER || 'root' }}@${{ secrets.VPS_HOST }} <<'EOF'
            set -e
            cd /home/deploy/projects/ai-aggregator-lobechat
            LOG=/tmp/lobe-gha-build.log
            : > "$LOG"
            nohup docker build --tag lobechat-custom:latest --progress=plain . > "$LOG" 2>&1 &
            BUILD_PID=$!
            echo "build started, pid=$BUILD_PID"

            # Poll up to 30 min (1800s / 15s = 120 ticks). If build wedges, exit non-zero.
            for i in $(seq 1 120); do
              if ! kill -0 "$BUILD_PID" 2>/dev/null; then
                wait "$BUILD_PID" 2>/dev/null
                EC=$?
                tail -30 "$LOG"
                if [ "$EC" -ne 0 ]; then
                  echo "build exited with $EC"
                  exit "$EC"
                fi
                docker images --format "{{.Repository}}:{{.Tag}} {{.CreatedAt}}" | grep "^lobechat-custom:latest"
                exit 0
              fi
              sleep 15
              # heartbeat every 2 min to keep SSH alive
              if [ $((i % 8)) -eq 0 ]; then
                echo "still building… ($((i*15))s)"
              fi
            done
            echo "build did not finish in 30 min — abort"
            kill "$BUILD_PID" 2>/dev/null || true
            tail -50 "$LOG"
            exit 1
          EOF

      - name: Restart container
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=15 ${{ secrets.VPS_SSH_USER || 'root' }}@${{ secrets.VPS_HOST }} <<'EOF'
            set -e
            cd /opt/lobechat
            docker compose up -d --force-recreate lobe 2>&1 | tail -10
            sleep 8
            docker ps --filter name=lobehub --format "{{.Names}} | {{.Status}}"
          EOF

      - name: Smoke check — root + cron route + static assets
        run: |
          # Root is reachable (any 3xx redirect to /signin = healthy)
          status=$(curl -s -o /dev/null -w '%{http_code}' https://ask.gptweb.ru)
          if [ "$status" -lt 200 ] || [ "$status" -ge 500 ]; then
            echo "::error::ask.gptweb.ru returned HTTP $status"
            exit 1
          fi
          echo "Root: HTTP $status (OK)"

          # Cron route exists (401 expected without Bearer token)
          cron=$(curl -s -o /dev/null -w '%{http_code}' -X POST https://ask.gptweb.ru/api/cron/poll-stuck-video-jobs)
          if [ "$cron" != "401" ] && [ "$cron" != "405" ]; then
            echo "::warning::poll-stuck-video-jobs returned HTTP $cron (expected 401)"
          else
            echo "Cron route: HTTP $cron (OK)"
          fi

          # CRITICAL: verify Next.js static chunks are served.
          # The 17.05 outage happened because Dockerfile didn't COPY .next/static
          # — HTML rendered fine (200) but every JS/CSS chunk 404'd, breaking the
          # entire client app. We did not notice for 13 hours because /signin
          # returns 307 even when the page is unusable. Net result: 0 signups.
          chunk=$(curl -s https://ask.gptweb.ru/register | grep -oE '_next/static/chunks/[a-zA-Z0-9_-]+\.js' | head -n 1)
          if [ -z "$chunk" ]; then
            echo "::error::No static chunk reference found in /register HTML"
            exit 1
          fi
          chunk_status=$(curl -s -o /dev/null -w '%{http_code}' "https://ask.gptweb.ru/$chunk")
          chunk_type=$(curl -s -o /dev/null -w '%{content_type}' "https://ask.gptweb.ru/$chunk")
          if [ "$chunk_status" != "200" ]; then
            echo "::error::Static chunk /$chunk returned HTTP $chunk_status — Dockerfile likely missing COPY .next/static"
            exit 1
          fi
          case "$chunk_type" in
            *javascript*) ;;
            *)
              echo "::error::Static chunk MIME is '$chunk_type', expected JavaScript — Next.js standalone build is broken"
              exit 1
              ;;
          esac
          echo "Static chunk: HTTP $chunk_status, $chunk_type (OK)"

          # /public assets (logo.png is always present)
          logo_status=$(curl -s -o /dev/null -w '%{http_code}' https://ask.gptweb.ru/logo.png)
          if [ "$logo_status" != "200" ]; then
            echo "::error::/logo.png returned HTTP $logo_status — Dockerfile likely missing COPY public"
            exit 1
          fi
          echo "Public asset: HTTP $logo_status (OK)"
